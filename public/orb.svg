<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- glowing white core: matches the dark-theme dump orb -->
    <radialGradient id="orbCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="68%" stop-color="#ffffff" />
      <stop offset="84%" stop-color="#fafafa" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <!-- soft bluish event-horizon halo -->
    <radialGradient id="orbHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7" />
      <stop offset="55%" stop-color="#c8cdff" stop-opacity="0.45" />
      <stop offset="78%" stop-color="#b4b9e1" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#b4b9e1" stop-opacity="0" />
    </radialGradient>
  </defs>
  <circle cx="32" cy="32" r="32" fill="url(#orbHalo)" />
  <circle cx="32" cy="32" r="22" fill="url(#orbCore)" />
</svg>
